      <line x1="30" y1="60" x2="50" y2="60"/>
      <line x1="30" y1="96" x2="50" y2="96"/>
      <line x1="30" y1="132" x2="50" y2="132"/>
      <line x1="30" y1="60" x2="30" y2="132"/>
    </g>
  </g>
  
  <!-- Accent gold glow -->
